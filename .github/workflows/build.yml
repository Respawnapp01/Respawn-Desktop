name: Build Respawn Desktop

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm install
      - name: Build exe
        run: npx electron-builder --win --publish never
      - name: Delete old release if exists
        run: gh release delete v1.0.1 --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Delete old tag if exists
        run: git push origin :refs/tags/v1.0.1 || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Release
        run: gh release create v1.0.1 dist/*.exe dist/*.yml dist/*.blockmap --title "Respawn v1.0.1" --notes "Custom titlebar, splash screen, bug fixes"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: respawn-windows
          path: dist/*.exe
