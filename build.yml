name: Build Respawn Desktop

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Read version from package.json
        id: pkg
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: npm install

      - name: Build exe
        run: npx electron-builder --win --publish never

      - name: Delete old release if exists
        shell: bash
        run: gh release delete "v${{ steps.pkg.outputs.version }}" --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete old tag if exists
        shell: bash
        run: git push origin ":refs/tags/v${{ steps.pkg.outputs.version }}" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        shell: bash
        run: gh release create "v${{ steps.pkg.outputs.version }}" dist/*.exe dist/*.yml dist/*.blockmap --title "Respawn v${{ steps.pkg.outputs.version }}" --notes "Latest update — floating call pics, bug fixes"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: respawn-windows
          path: dist/*.exe
