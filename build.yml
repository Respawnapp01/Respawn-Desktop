name: Build Respawn Desktop

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      
      - name: Install dependencies
        run: npm install
      
      - name: Build exe (no publish)
        run: npx electron-builder --win --publish never
      
      - name: Create Release and upload exe
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.0
          name: Respawn v1.0.0
          draft: false
          prerelease: false
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: actions/upload-artifact@v4
        with:
          name: respawn-windows
          path: dist/*.exe
